<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Калькулятор производных</title>
    <style>
        :root {
            --bg: #1a2d3c;
            --card-bg: #1e3545;
            --text: #ffffff;
            --text-secondary: #8ba5b8;
            --accent: #1abc9c;
            --border: rgba(46, 204, 113, 0.1);
            --input-bg: #2c5a77;
            --result-bg: #0f2a38;
            --preview-bg: #2c5a77;
            --preview-text: #ffffff;
            --btn-bg: #34495e;
            --hint-bg: #1a4a5a;
            --math-color: #ffffff;
        }
        :root.light-mode {
            --bg: linear-gradient(145deg, #f5f7fc 0%, #eef2f8 100%);
            --card-bg: white;
            --text: #1a2a3f;
            --text-secondary: #6a7e9c;
            --accent: #1abc9c;
            --border: #eff3f8;
            --input-bg: #e2e8f0;
            --result-bg: #f1f5f9;
            --preview-bg: #e2e8f0;
            --preview-text: #1a2a3f;
            --hint-bg: #fefce8;
            --math-color: #1a2a3f;
            --btn-bg: #d1d9e6;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            min-height: 100vh;
            padding: 32px 20px;
        }
        .container { max-width: 700px; margin: 0 auto; position: relative; }
        .theme-toggle {
            position: absolute;
            top: 0;
            right: 0;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--card-bg);
            border: 1px solid var(--border);
            cursor: pointer;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            color: var(--text);
        }
        .card {
            background: var(--card-bg);
            border-radius: 32px;
            padding: 24px;
            border: 1px solid var(--border);
            margin-top: 50px;
        }
        h1 { font-size: 1.5rem; text-align: center; margin-bottom: 8px; color: var(--text); }
        .sub { text-align: center; color: var(--text-secondary); font-size: 0.85rem; margin-bottom: 20px; }
        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: var(--text); font-weight: 500; }
        .preview {
            background: var(--preview-bg);
            border-radius: 16px;
            padding: 16px 20px;
            margin-top: 8px;
            overflow-x: auto;
            min-height: 52px;
            display: flex;
            align-items: center;
            color: var(--preview-text);
            font-size: 1.1rem;
        }
        input {
            width: 100%;
            padding: 14px 16px;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 28px;
            font-size: 1rem;
            color: var(--text);
            outline: none;
            font-family: monospace;
        }
        input::placeholder { color: var(--text-secondary); opacity: 0.7; }

        .templates {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 8px;
        }
        .tpl-btn {
            padding: 8px 14px;
            background: var(--btn-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            color: var(--text);
            cursor: pointer;
            font-size: 0.85rem;
            font-family: monospace;
            transition: all 0.2s;
        }
        .tpl-btn:active { background: var(--accent); color: white; }

        .options-row {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
            align-items: end;
        }
        .options-row > div { flex: 1; }
        .options-row input {
            padding: 10px 14px;
            font-size: 0.9rem;
        }

        .button-row {
            display: flex;
            gap: 12px;
            margin-top: 10px;
        }
        .calc-btn {
            flex: 2;
            padding: 14px;
            background: var(--accent);
            border: none;
            border-radius: 40px;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .hint-btn {
            flex: 1;
            padding: 14px;
            background: var(--btn-bg);
            border: 1px solid var(--border);
            border-radius: 40px;
            color: var(--text);
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        .calc-btn:active, .hint-btn:active { transform: scale(0.97); }

        .hint-block {
            display: none;
            margin-top: 16px;
            background: var(--hint-bg);
            border-left: 4px solid var(--accent);
            border-radius: 16px;
            padding: 16px;
            transition: all 0.3s ease;
        }
        .hint-block.show { display: block; }
        .hint-title {
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .hint-formula {
            font-family: monospace;
            font-size: 1.1rem;
            padding: 12px;
            margin: 8px 0;
            background: rgba(0,0,0,0.05);
            border-radius: 12px;
            overflow-x: auto;
            min-height: 60px;
        }
        .hint-formula mjx-container {
            color: var(--math-color) !important;
        }
        .hint-formula mjx-container * {
            color: var(--math-color) !important;
        }
        .hint-desc {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-top: 8px;
            line-height: 1.5;
        }
        .result {
            margin-top: 24px;
            background: var(--result-bg);
            border-radius: 20px;
            padding: 20px;
        }
        .result-label {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-bottom: 8px;
            letter-spacing: 1px;
        }
        .result-value {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--text);
            word-break: break-word;
            overflow-x: auto;
        }
        .result-value mjx-container {
            color: var(--text) !important;
        }
        .back-link {
            display: inline-block;
            margin-top: 20px;
            padding: 8px 20px;
            background: var(--accent);
            color: white;
            text-decoration: none;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.9rem;
            text-align: center;
        }
        #loadingOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 999;
            transition: opacity 0.3s ease;
        }
        .loader {
            text-align: center;
            color: var(--text);
        }
        .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid var(--text-secondary);
            border-top: 3px solid var(--accent);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin: 0 auto 12px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        @media (max-width: 550px) {
            body { padding: 20px 16px; }
            .button-row { flex-direction: column; }
        }
    </style>
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']]
            },
            svg: { scale: 0.95, displayAlign: 'center' },
            options: { ignoreHtmlClass: 'no-mathjax', processHtmlClass: 'math' }
        };
    </script>
    <script src="file:///android_asset/es5/tex-chtml.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/algebrite@1.4.0/dist/algebrite.bundle-for-browser.min.js"></script>
</head>
<body>

<div id="loadingOverlay">
    <div class="loader">
        <div class="spinner"></div>
        <div>Загрузка...</div>
    </div>
</div>

<div class="container">
    <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">??</button>

    <div class="card">
        <h1>? Калькулятор производных</h1>
        <div class="sub">f'(x), f''(x), f'''(x) — производные любых порядков</div>

        <div class="input-group">
            <label>Функция f(x)</label>
            <input type="text" id="funcInput" placeholder="например: (2x^2+3)^6, sin(x^2), e^(2x), ln(x)" value="(2x^2+3)^6" oninput="showPreview(); hideHint()">
            <div class="templates">
                <button class="tpl-btn" onclick="insertTemplate('sin(')">sin</button>
                <button class="tpl-btn" onclick="insertTemplate('cos(')">cos</button>
                <button class="tpl-btn" onclick="insertTemplate('tan(')">tan</button>
                <button class="tpl-btn" onclick="insertTemplate('ln(')">ln</button>
                <button class="tpl-btn" onclick="insertTemplate('e^(')">e?</button>
                <button class="tpl-btn" onclick="insertTemplate('sqrt(')">v</button>
                <button class="tpl-btn" onclick="insertTemplate('pi')">?</button>
                <button class="tpl-btn" onclick="insertTemplate('^2')">?</button>
            </div>
            <div class="preview math" id="preview"></div>
        </div>

        <div class="options-row">
            <div>
                <label>Порядок производной</label>
                <input type="number" id="orderInput" value="1" min="1" max="10" onchange="showPreview()">
            </div>
            <div>
                <label>Точка x? (необязательно)</label>
                <input type="text" id="pointInput" placeholder="например: 2, pi/2">
            </div>
        </div>

        <div class="button-row">
            <button class="calc-btn" onclick="calc()">ВЫЧИСЛИТЬ</button>
            <button class="hint-btn" onclick="showFormulaHint()">?? Подсказка</button>
        </div>

        <div id="hintBlock" class="hint-block">
            <div class="hint-title">?? Формула для решения</div>
            <div class="hint-formula math" id="hintFormula"></div>
            <div class="hint-desc math" id="hintDesc"></div>
        </div>

        <div id="resultBlock" style="display:none;">
            <div class="result">
                <div class="result-label">?? РЕЗУЛЬТАТ</div>
                <div class="result-value math" id="resultText"></div>
            </div>
        </div>
    </div>

    <div style="text-align: center;">
        <a href="index.html" class="back-link">< Назад</a>
    </div>
</div>

<script>

    function detectFormulaType(func) {
        const f = func.toLowerCase().replace(/\s/g, '');

        const powerMatch = f.match(/\(.+\)\^(\d+)$/);
        if (powerMatch) {
            return {
                formula: '(u^n)\' = n \\cdot u^{n-1} \\cdot u\'',
                desc: 'Сложная степень. Сначала дифференцируем внешнюю степень, затем умножаем на производную внутренней функции $u$.'
            };
        }

        if (f.match(/^x\^(\d+)$/)) {
            return {
                formula: '(x^n)\' = n \\cdot x^{n-1}',
                desc: 'Простая степенная функция.'
            };
        }

        if (f.includes('sin(')) {
            return {
                formula: '(\\sin u)\' = \\cos u \\cdot u\'',
                desc: 'Производная синуса сложной функции $u(x)$.'
            };
        }

        if (f.includes('cos(')) {
            return {
                formula: '(\\cos u)\' = -\\sin u \\cdot u\'',
                desc: 'Производная косинуса сложной функции $u(x)$ (не забывайте знак минус).'
            };
        }

        if (f.includes('tan(') || f.includes('tg(')) {
            return {
                formula: '(\\operatorname{tg} u)\' = \\frac{u\'}{\\cos^2 u} = u\' \\cdot (1 + \\operatorname{tg}^2 u)',
                desc: 'Производная тангенса сложной функции $u(x)$.'
            };
        }

        if (f.includes('ln(')) {
            return {
                formula: '(\\ln u)\' = \\frac{u\'}{u}',
                desc: 'Производная натурального логарифма сложной функции $u(x)$.'
            };
        }

        if (f.includes('e^(') || f.match(/e\^[a-z0-9\(]/)) {
            return {
                formula: '(e^{u})\' = e^{u} \\cdot u\'',
                desc: 'Производная экспоненты сложной функции $u(x)$.'
            };
        }

        return {
            formula: '\\text{Используйте основные правила дифференцирования}',
            desc: 'См. раздел "Производная" в справочнике для полного списка формул.'
        };
    }

    async function showFormulaHint() {
        const func = document.getElementById('funcInput').value.trim();
        const order = parseInt(document.getElementById('orderInput').value) || 1;

        if (!func) {
            document.getElementById('hintFormula').innerHTML = '?? Введите функцию';
            document.getElementById('hintDesc').innerHTML = 'Напишите $f(x)$ в поле ввода, чтобы получить подсказку.';
            document.getElementById('hintBlock').classList.add('show');
            if (window.MathJax) await MathJax.typesetPromise();
            return;
        }

        const info = detectFormulaType(func);

        let orderText = '';
        if (order === 1) orderText = 'первого порядка';
        else if (order === 2) orderText = 'второго порядка';
        else orderText = order + '-го порядка';

        document.getElementById('hintFormula').innerHTML = `$$${info.formula}$$`;
        document.getElementById('hintDesc').innerHTML = `${info.desc}<br><br>?? Применяется для производной ${orderText}. Для нахождения ${order}-й производной последовательно дифференцируйте результат предыдущего шага.`;

        const hintBlock = document.getElementById('hintBlock');
        hintBlock.classList.add('show');

        if (window.MathJax) {
            await MathJax.typesetPromise();
        }

        setTimeout(() => {
            hintBlock.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }, 100);
    }

    function hideHint() {
        const hintBlock = document.getElementById('hintBlock');
        hintBlock.classList.remove('show');
    }

    function formatForDisplay(expr) {
        var result = expr;
        result = result.replace(/pi/gi, '\\pi');
        result = result.replace(/\bsin\b/g, '\\sin');
        result = result.replace(/\bcos\b/g, '\\cos');
        result = result.replace(/\btan\b/g, '\\tan');
        result = result.replace(/\bln\b/g, '\\ln');
        result = result.replace(/\bsqrt\b/g, '\\sqrt');
        result = result.replace(/\(([^()]+)\)\/\(([^()]+)\)/g, '\\frac{$1}{$2}');
        result = result.replace(/\(([^()]+)\)\/([a-zA-Z0-9^\\]+)/g, '\\frac{$1}{$2}');
        result = result.replace(/([a-zA-Z0-9^\\]+)\/\(([^()]+)\)/g, '\\frac{$1}{$2}');
        result = result.replace(/([a-zA-Z0-9^\\]+)\/([a-zA-Z0-9^\\]+)/g, '\\frac{$1}{$2}');
        result = result.replace(/\*\*/g, '^');
        result = result.replace(/\*/g, ' \\cdot ');
        return result;
    }

    function insertTemplate(text) {
        var input = document.getElementById('funcInput');
        var start = input.selectionStart;
        var end = input.selectionEnd;
        var val = input.value;

        if (text === 'sin(' || text === 'cos(' || text === 'tan(' || text === 'ln(' || text === 'sqrt(') {
            input.value = val.substring(0, start) + text + 'x)' + val.substring(end);
            input.selectionStart = start + text.length + 1;
            input.selectionEnd = start + text.length + 1;
        } else if (text === 'e^(') {
            input.value = val.substring(0, start) + 'e^(x)' + val.substring(end);
            input.selectionStart = start + 4;
            input.selectionEnd = start + 4;
        } else if (text === '^2') {
            input.value = val.substring(0, start) + '^2' + val.substring(end);
            input.selectionStart = start + 2;
            input.selectionEnd = start + 2;
        } else {
            input.value = val.substring(0, start) + text + val.substring(end);
            input.selectionStart = start + text.length;
            input.selectionEnd = start + text.length;
        }
        input.focus();
        showPreview();
        hideHint();
    }

    function showPreview() {
        var f = document.getElementById('funcInput').value;
        var order = parseInt(document.getElementById('orderInput').value) || 1;
        var p = document.getElementById('preview');

        if (!f) {
            p.innerHTML = '\\( f(x) = ? \\)';
        } else {
            var strokes = '';
            for (var i = 0; i < order; i++) strokes += "'";
            p.innerHTML = '\\( \\displaystyle f' + strokes + '(x) = \\left(' + formatForDisplay(f) + '\\right)' + strokes + ' \\)';
        }
        if (window.MathJax) MathJax.typesetPromise();
    }

    function calc() {
        var f = document.getElementById('funcInput').value.trim();
        var order = parseInt(document.getElementById('orderInput').value) || 1;
        var point = document.getElementById('pointInput').value.trim();

        if (!f) return;
        if (typeof Algebrite === 'undefined') return;

        var fForCalc = f.replace(/pi/gi, '3.141592653589793');
        var result;

        if (order === 1) {
            var clean = fForCalc.replace(/\s+/g, '');
            var match = clean.match(/^\((.+)\)\^(\d+)$/);

            if (match) {
                var base = match[1];
                var power = parseInt(match[2]);
                var baseDeriv = Algebrite.derivative(base, 'x').toString();
                var coef = Algebrite.simplify(power + '*(' + baseDeriv + ')').toString();
                var newPower = power - 1;
                if (newPower === 1) {
                    result = coef + '*(' + base + ')';
                } else {
                    result = coef + '*(' + base + ')^' + newPower;
                }
            } else {
                result = Algebrite.derivative(fForCalc, 'x').toString();
                try { result = Algebrite.simplify(result).toString(); } catch(e) {}
            }
        } else {
            result = fForCalc;
            for (var i = 0; i < order; i++) {
                result = Algebrite.derivative(result, 'x').toString();
            }
            try { result = Algebrite.simplify(result).toString(); } catch(e) {}
        }

        var strokes = '';
        for (var j = 0; j < order; j++) strokes += "'";

        if (point) {
            var pointForCalc = point.replace(/pi/gi, '3.141592653589793');
            var valAtPoint;
            try {
                var evaled = Algebrite.eval(result, 'x', pointForCalc).toString();
                var floated = Algebrite.float(evaled);
                valAtPoint = parseFloat(floated.toString()).toFixed(6).replace(/\.?0+$/, '');
            } catch(e) {
                valAtPoint = '—';
            }

            document.getElementById('resultText').innerHTML =
                '\\( f' + strokes + '(x) = ' + formatForDisplay(result) + ' \\)<br>' +
                '\\( f' + strokes + '(' + formatForDisplay(point) + ') = ' + valAtPoint + ' \\)';
        } else {
            document.getElementById('resultText').innerHTML = '\\( f' + strokes + '(x) = ' + formatForDisplay(result) + ' \\)';
        }

        document.getElementById('resultBlock').style.display = 'block';
        if (window.MathJax) MathJax.typesetPromise();
    }

    function toggleTheme() {
        var html = document.documentElement;
        var btn = document.getElementById('themeBtn');
        if (html.classList.contains('light-mode')) {
            html.classList.remove('light-mode');
            localStorage.setItem('mathTheme', 'dark');
            btn.textContent = '??';
        } else {
            html.classList.add('light-mode');
            localStorage.setItem('mathTheme', 'light');
            btn.textContent = '??';
        }
        if (window.MathJax) MathJax.typesetPromise();
    }

    (function() {
        if (localStorage.getItem('mathTheme') === 'light') {
            document.documentElement.classList.add('light-mode');
            document.getElementById('themeBtn').textContent = '??';
        }
    })();

    showPreview();
</script>

</body>
</html>
