<script>
    function isInteger(value, tolerance = 1e-9) {
      return Math.abs(value - Math.round(value)) < tolerance;
    }

    function findExactRoot(n, degree) {
      if (n < 0 && degree % 2 === 0) return null;
      const root = Math.pow(Math.abs(n), 1 / degree);
      if (isInteger(root)) {
        const result = Math.round(root);
        return n < 0 ? -result : result;
      }
      return null;
    }

    function simplifyRoot(n, degree) {
      if (n === 0) return { outside: 0, inside: 0, display: '0' };
      if (n === 1) return { outside: 1, inside: 1, display: '1' };
      if (n < 0 && degree % 2 === 0) return null;

      const absN = Math.abs(n);
      let outside = 1;
      let inside = absN;

      for (let i = 2; Math.pow(i, degree) <= inside; i++) {
        const power = Math.pow(i, degree);
        while (inside % power === 0 && inside >= power) {
          outside *= i;
          inside /= power;
        }
      }

      if (inside === 1) {
        const result = n < 0 ? -outside : outside;
        return { outside: result, inside: 1, display: `${result}`, perfect: true };
      }

      return {
        outside: n < 0 ? -outside : outside,
        inside: inside,
        display: outside === 1 ? `\\sqrt[${degree}]{${inside}}` : `${outside}\\sqrt[${degree}]{${inside}}`,
        perfect: false
      };
    }

    function findPowerRepresentation(n) {
      if (n <= 1 || !isInteger(n)) return null;
      const intN = Math.round(Math.abs(n));
      const sign = n < 0 ? -1 : 1;
      const results = [];
      const limit = Math.floor(Math.sqrt(intN)) + 1;

      for (let base = 2; base <= limit; base++) {
        let exp = 2;
        let power = base * base;
        while (power <= intN) {
          if (power === intN) {
            results.push({ base: sign * base, exponent: exp });
          }
          exp++;
          power *= base;
          if (power > intN) break;
        }
      }
      return results.length > 0 ? results : null;
    }

    function decimalRoot(n, degree) {
      if (n < 0 && degree % 2 === 0) return NaN;
      return Math.pow(n, 1 / degree);
    }

    function formatNumber(value) {
      if (typeof value === 'number' && isInteger(value)) {
        return Math.round(value).toString();
      }
      return value.toString();
    }

    function analyzeNumber(rawInput, degree) {
      const value = parseFloat(rawInput);
      if (isNaN(value)) {
        return { error: 'Ââĺäčňĺ ÷čńëî.' };
      }

      const n = value;
      const exactRoot = findExactRoot(n, degree);
      const simplified = simplifyRoot(n, degree);
      const decimal = decimalRoot(n, degree);
      const powers = findPowerRepresentation(n);

      return {
        input: n,
        degree: degree,
        exactRoot: exactRoot,
        simplified: simplified,
        decimal: decimal,
        powers: powers,
        isIntegerResult: exactRoot !== null
      };
    }

    function renderResult(analysis) {
      if (analysis.error) {
        return `<div style="color: #e74c3c;">?? ${analysis.error}</div>`;
      }

      const n = analysis.input;
      const degree = analysis.degree;
      const exactRoot = analysis.exactRoot;
      const simplified = analysis.simplified;
      const decimal = analysis.decimal;
      const powers = analysis.powers;

      let html = '';

      let degreeName = '';
      if (degree === 2) degreeName = 'ęâŕäđŕňíűé';
      else if (degree === 3) degreeName = 'ęóáč÷ĺńęčé';
      else degreeName = `${degree}-é ńňĺďĺíč`;

      if (exactRoot !== null && !isNaN(exactRoot)) {
        html += `<div class="result-line">?? \\( \\sqrt[${degree}]{${formatNumber(n)}} = ${exactRoot} \\) (ňî÷íűé ${degreeName} ęîđĺíü)</div>`;
      } else if (simplified && !isNaN(decimal)) {
        html += `<div class="result-line">?? \\( \\sqrt[${degree}]{${formatNumber(n)}} = ${simplified.display} \\) (óďđîů¸ííűé âčä)</div>`;
        html += `<div class="result-line" style="font-size:0.9rem; color: var(--text-secondary);">
        ? äĺń˙ňč÷íî: \\( \\sqrt[${degree}]{${formatNumber(n)}} \\approx ${decimal.toFixed(8)} \\)</div>`;
      } else if (!isNaN(decimal)) {
        html += `<div class="result-line">?? \\( \\sqrt[${degree}]{${formatNumber(n)}} \\approx ${decimal.toFixed(8)} \\)</div>`;
      } else {
        html += `<div class="result-line">?? Ęîđĺíü ${degreeName} čç îňđčöŕňĺëüíîăî ÷čńëŕ íĺ îďđĺäĺë¸í â äĺéńňâčňĺëüíűő ÷čńëŕő</div>`;
      }

      if (powers && powers.length > 0) {
        html += `<div class="result-line" style="margin-top: 8px;">`;
        html += `?? \\( ${formatNumber(n)} = `;
        const powerStrings = powers.map(p => `${p.base}^{${p.exponent}}`);
        html += powerStrings.join(' = ');
        html += ` \\)</div>`;
      }

      return html;
    }

    function buildTable() {
      let html = '<table>';
      html += '<thead><tr>';
      html += '<th>n</th><th>n?</th><th>n?</th>';
      html += '</tr></thead><tbody>';

      for (let i = 2; i <= 20; i++) {
        html += '<tr>';
        html += `<td>${i}</td>`;
        html += `<td>${i * i}</td>`;
        html += `<td>${i * i * i}</td>`;
        html += '</tr>';
      }

      html += '</tbody></table>';
      return html;
    }

    function updateUI() {
      const rawValue = document.getElementById('numInput').value.trim();
      const degree = parseInt(document.getElementById('rootDegree').value);

      if (rawValue === '') {
        document.getElementById('resultPanel').innerHTML = `<div>Ââĺäčňĺ ÷čńëî.</div>`;
        return;
      }

      const analysis = analyzeNumber(rawValue, degree);
      const resultHtml = renderResult(analysis);
      document.getElementById('resultPanel').innerHTML = resultHtml;

      if (window.MathJax) {
        MathJax.typesetPromise();
      }
    }

    function renderTable() {
      document.getElementById('tableContainer').innerHTML = buildTable();
    }

    function toggleTheme() {
      const html = document.documentElement;
      const btn = document.getElementById('themeBtn');
      if (html.classList.contains('light-mode')) {
        html.classList.remove('light-mode');
        localStorage.setItem('mathTheme', 'dark');
        btn.textContent = '??';
      } else {
        html.classList.add('light-mode');
        localStorage.setItem('mathTheme', 'light');
        btn.textContent = '??';
      }
      if (window.MathJax) MathJax.typesetPromise();
    }

    (function() {
      if (localStorage.getItem('mathTheme') === 'light') {
        document.documentElement.classList.add('light-mode');
        document.getElementById('themeBtn').textContent = '??';
      }
    })();

    document.getElementById('calcBtn').addEventListener('click', updateUI);
    document.getElementById('numInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') updateUI();
    });
    document.getElementById('rootDegree').addEventListener('change', updateUI);

    renderTable();
    updateUI();
</script>
