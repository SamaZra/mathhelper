<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Избранное — Математический справочник</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #1a2d3c;
            --card-bg: #1e3545;
            --text: #ffffff;
            --text-secondary: #8ba5b8;
            --accent: #1abc9c;
            --border: rgba(46, 204, 113, 0.1);
            --icon-color: #8ba5b8;
            --header-bg: linear-gradient(135deg, #1e3545, #162a38);
            --menu-card-bg: #1e3545;
            --menu-item-bg: #1e3545;
            --menu-item-hover: #233e50;
        }

        :root.light-mode {
            --bg: linear-gradient(145deg, #f5f7fc 0%, #eef2f8 100%);
            --card-bg: white;
            --text: #1a2a3f;
            --text-secondary: #6a7e9c;
            --accent: #1abc9c;
            --border: #eff3f8;
            --icon-color: #1a2d3c;
            --header-bg: linear-gradient(135deg, #ffffff, #f8fafc);
            --menu-card-bg: white;
            --menu-item-bg: white;
            --menu-item-hover: linear-gradient(95deg, #f8fafd, #ffffff);
        }

        body {
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            min-height: 100vh;
            padding: 32px 20px 48px;
        }

        .container {
            max-width: 720px;
            margin: 0 auto;
            position: relative;
        }

        .theme-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--card-bg);
            border: 1px solid var(--border);
            cursor: pointer;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            color: var(--text);
        }
        .theme-toggle:hover { transform: scale(1.1); }

        .header {
            text-align: center;
            margin-bottom: 32px;
            padding: 24px 24px;
            background: var(--header-bg);
            border-radius: 40px;
        }
        h1 { font-size: 1.8rem; font-weight: 700; color: var(--text); margin-bottom: 8px; }
        .subtitle { color: var(--text-secondary); font-size: 0.85rem; }

        .content-card {
            background: var(--menu-card-bg);
            border-radius: 32px;
            overflow: hidden;
            border: 1px solid var(--border);
            padding: 20px;
        }

        .favorites-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .favorites-count {
            background: var(--accent);
            padding: 6px 14px;
            border-radius: 30px;
            color: white;
            font-size: 0.8rem;
            font-weight: 600;
        }
        .clear-all-btn {
            background: var(--menu-item-bg);
            border: 1px solid var(--border);
            padding: 8px 16px;
            border-radius: 30px;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.2s;
        }
        .clear-all-btn:hover { background: #e74c3c; color: white; border-color: #e74c3c; }

        .favorites-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .favorite-item {
            display: flex;
            align-items: center;
            padding: 16px 20px;
            background: var(--menu-item-bg);
            border-radius: 20px;
            border: 1px solid var(--border);
            text-decoration: none;
            transition: all 0.2s;
            gap: 16px;
            cursor: pointer;
        }
        .favorite-item:hover {
            background: var(--menu-item-hover);
            transform: translateX(5px);
        }
        .favorite-icon {
            font-size: 32px;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--card-bg);
            border-radius: 16px;
            color: var(--text);
        }
        .favorite-content { flex: 1; }
        .favorite-title { font-size: 1rem; font-weight: 700; color: var(--text); margin-bottom: 4px; }
        .favorite-category { font-size: 0.7rem; color: var(--accent); }
        .favorite-desc { font-size: 0.7rem; color: var(--text-secondary); margin-top: 2px; }
        .remove-fav {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--text-secondary);
            padding: 8px;
            border-radius: 40px;
            transition: all 0.2s;
        }
        .remove-fav:hover { color: #e74c3c; transform: scale(1.1); }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }
        .empty-state .empty-icon { font-size: 64px; margin-bottom: 16px; display: block; }
        .empty-state p { margin-bottom: 20px; }

        .back-link {
            display: inline-block;
            margin-top: 24px;
            padding: 10px 24px;
            background: var(--accent);
            color: white;
            text-decoration: none;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.9rem;
            text-align: center;
        }

        @media (max-width: 550px) {
            body { padding: 20px 14px 36px; }
            h1 { font-size: 1.4rem; }
            .favorite-icon { width: 40px; height: 40px; font-size: 24px; }
            .favorite-item { padding: 12px 16px; }
        }
    </style>
</head>

    function getPageInfo(url) {
        const decodedUrl = decodeURIComponent(url);
        const found = pagesDB.find(p => p.url === url || p.url === decodedUrl);
        if (found) return found;
        return { title: url.replace('.html', '').replace(/%D0/g, ''), category: "Страница", icon: "📄", desc: "" };
    }

    function getFavorites() {
        const saved = localStorage.getItem(FAV_KEY);
        return saved ? JSON.parse(saved) : [];
    }

    function saveFavorites(fav) {
        localStorage.setItem(FAV_KEY, JSON.stringify(fav));
    }

    function removeFromFavorites(url) {
        let fav = getFavorites();
        fav = fav.filter(f => f !== url);
        saveFavorites(fav);
        renderFavorites();
    }

    function clearAllFavorites() {
        if (confirm('Удалить все страницы из избранного?')) {
            saveFavorites([]);
            renderFavorites();
        }
    }

    function renderFavorites() {
        const favorites = getFavorites();
        const container = document.getElementById('favoritesList');
        const countSpan = document.getElementById('favCount');

        countSpan.textContent = favorites.length;

        if (favorites.length === 0) {
            container.innerHTML = `<div class="empty-state">
                <div class="empty-icon">⭐</div>
                <p>У вас пока нет избранных страниц</p>
                <p>Нажмите на звёздочку ★ в правом верхнем углу любой страницы</p>
            </div>`;
            return;
        }

        container.innerHTML = favorites.map(url => {
            const info = getPageInfo(url);
            return `
                <div class="favorite-item" onclick="window.location.href='${url}'">
                    <div class="favorite-icon">${info.icon}</div>
                    <div class="favorite-content">
                        <div class="favorite-title">${info.title}</div>
                        <div class="favorite-category">${info.category}</div>
                        <div class="favorite-desc">${info.desc}</div>
                    </div>
                    <button class="remove-fav" onclick="event.stopPropagation(); removeFromFavorites('${url}')" title="Удалить">✖</button>
                </div>
            `;
        }).join('');
    }

    (function() {
        const savedTheme = localStorage.getItem('mathTheme');
        if (savedTheme === 'light') {
            document.documentElement.classList.add('light-mode');
            document.getElementById('themeBtn').textContent = '☀️';
        }
    })();

    function toggleTheme() {
        const html = document.documentElement;
        const btn = document.getElementById('themeBtn');
        if (html.classList.contains('light-mode')) {
            html.classList.remove('light-mode');
            localStorage.setItem('mathTheme', 'dark');
            btn.textContent = '🌙';
        } else {
            html.classList.add('light-mode');
            localStorage.setItem('mathTheme', 'light');
            btn.textContent = '☀️';
        }
        renderFavorites();
    }

    renderFavorites();
</script>
</body>
</html>
