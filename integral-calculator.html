<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Калькулятор интегралов</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #1a2d3c;
            --card-bg: #1e3545;
            --text: #ffffff;
            --text-secondary: #8ba5b8;
            --accent: #1abc9c;
            --border: rgba(46, 204, 113, 0.1);
            --input-bg: #2c5a77;
            --result-bg: #0f2a38;
            --preview-bg: #2c5a77;
            --preview-text: #ffffff;
            --hint-bg: #1a4a5a;
            --math-color: #ffffff;
            --btn-bg: #34495e;
        }

        :root.light-mode {
            --bg: linear-gradient(145deg, #f5f7fc 0%, #eef2f8 100%);
            --card-bg: white;
            --text: #1a2a3f;
            --text-secondary: #6a7e9c;
            --accent: #1abc9c;
            --border: #eff3f8;
            --input-bg: #e2e8f0;
            --result-bg: #f1f5f9;
            --preview-bg: #e2e8f0;
            --preview-text: #1a2a3f;
            --hint-bg: #fefce8;
            --math-color: #1a2a3f;
            --btn-bg: #d1d9e6;
        }

        body {
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            min-height: 100vh;
            padding: 32px 20px;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
            position: relative;
        }

        .theme-toggle {
            position: absolute;
            top: 0;
            right: 0;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--card-bg);
            border: 1px solid var(--border);
            cursor: pointer;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            color: var(--text);
        }

        .card {
            background: var(--card-bg);
            border-radius: 32px;
            padding: 24px;
            border: 1px solid var(--border);
            margin-top: 50px;
        }

        h1 {
            font-size: 1.5rem;
            text-align: center;
            margin-bottom: 8px;
            color: var(--text);
        }

        .sub {
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.85rem;
            margin-bottom: 20px;
        }

        .type-toggle {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            justify-content: center;
        }

        .type-btn {
            flex: 1;
            padding: 12px;
            background: var(--input-bg);
            border: none;
            border-radius: 40px;
            color: var(--text);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .type-btn.active {
            background: var(--accent);
            color: white;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: var(--text);
            font-weight: 500;
        }

        .preview {
            background: var(--preview-bg);
            border-radius: 16px;
            padding: 16px 20px;
            margin-top: 8px;
            overflow-x: auto;
            min-height: 52px;
            display: flex;
            align-items: center;
            color: var(--preview-text);
            font-size: 1.1rem;
        }

        .preview mjx-container {
            color: var(--preview-text) !important;
        }
        .preview mjx-container * {
            color: var(--preview-text) !important;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 28px;
            font-size: 1rem;
            color: var(--text);
            outline: none;
            font-family: monospace;
        }

        input::placeholder {
            color: var(--text-secondary);
            opacity: 0.7;
        }

        .limits-row {
            display: flex;
            gap: 16px;
            margin-top: 10px;
        }

        .limits-row input {
            flex: 1;
        }

        .pi-hint {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 6px;
            padding-left: 4px;
        }

        .button-row {
            display: flex;
            gap: 12px;
            margin-top: 10px;
        }

        .calc-btn {
            flex: 2;
            padding: 14px;
            background: var(--accent);
            border: none;
            border-radius: 40px;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .hint-btn {
            flex: 1;
            padding: 14px;
            background: var(--btn-bg);
            border: 1px solid var(--border);
            border-radius: 40px;
            color: var(--text);
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .calc-btn:active, .hint-btn:active {
            transform: scale(0.97);
        }

        .hint-block {
            display: none;
            margin-top: 16px;
            background: var(--hint-bg);
            border-left: 4px solid var(--accent);
            border-radius: 16px;
            padding: 16px;
            transition: all 0.3s ease;
        }

        .hint-block.show {
            display: block;
        }

        .hint-title {
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .hint-formula {
            font-family: monospace;
            font-size: 1.1rem;
            padding: 12px;
            margin: 8px 0;
            background: rgba(0,0,0,0.05);
            border-radius: 12px;
            overflow-x: auto;
            min-height: 60px;
        }

        .hint-formula mjx-container {
            color: var(--math-color) !important;
        }
        .hint-formula mjx-container * {
            color: var(--math-color) !important;
        }

        .hint-desc {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-top: 8px;
            line-height: 1.5;
        }

        .hint-desc mjx-container {
            color: var(--math-color) !important;
        }
        .hint-desc mjx-container * {
            color: var(--math-color) !important;
        }

        .result {
            margin-top: 24px;
            background: var(--result-bg);
            border-radius: 20px;
            padding: 20px;
        }

        .result-label {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .result-value {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--text);
            word-break: break-word;
            overflow-x: auto;
        }

        .result-value mjx-container {
            color: var(--text) !important;
        }
        .result-value mjx-container * {
            color: var(--text) !important;
        }

        .error-message {
            color: #e74c3c;
            margin-top: 12px;
            text-align: center;
        }

        .back-link {
            display: inline-block;
            margin-top: 20px;
            padding: 8px 20px;
            background: var(--accent);
            color: white;
            text-decoration: none;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.9rem;
            text-align: center;
        }

        #loadingOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 999;
            transition: opacity 0.3s ease;
        }

        .loader {
            text-align: center;
            color: var(--text);
        }

        .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid var(--text-secondary);
            border-top: 3px solid var(--accent);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin: 0 auto 12px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 550px) {
            body {
                padding: 20px 16px;
            }
            .button-row {
                flex-direction: column;
            }
        }
    
    .favorite-btn { position: fixed; bottom: 20px; left: 20px; width: 44px; height: 44px; border-radius: 50%; background: var(--card-bg); border: 1px solid var(--border); cursor: pointer; font-size: 26px; display: flex; align-items: center; justify-content: center; z-index: 1000; color: var(--text-secondary); transition: all 0.2s; backdrop-filter: blur(4px); }
    .favorite-btn:hover { transform: scale(1.1); }
    .favorite-btn.active { color: #facc15; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/algebrite@1.4.0/dist/algebrite.bundle-for-browser.min.js"></script>
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: {
                scale: 0.95,
                displayAlign: 'center'
            },
            options: {
                ignoreHtmlClass: 'no-mathjax',
                processHtmlClass: 'math'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
</head>
<body>

<div id="loadingOverlay">
    <div class="loader">
        <div class="spinner"></div>
        <div>Загрузка...</div>
    </div>
</div>

<div class="container">
    <button class="favorite-btn" id="favoriteBtn" onclick="toggleFavorite()">☆</button>   <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌙</button>

    <div class="card">
        <h1>🧮 Калькулятор интегралов</h1>
        <div class="sub">∫ f(x) dx — для проверки решений</div>

        <div class="type-toggle">
            <button class="type-btn active" onclick="setType('indefinite')">Неопределённый</button>
            <button class="type-btn" onclick="setType('definite')">Определённый</button>
        </div>

        <div class="input-group">
            <label>Функция f(x)</label>
            <input type="text" id="functionInput" placeholder="например: x^2, sin(x), e^x, 1/x, cos(x), sqrt(x)" value="x^2" oninput="hideHint()">
            <div class="preview math" id="preview">\( f(x) = x^2 \)</div>
        </div>

        <div id="limitsContainer" style="display: none;">
            <label>Пределы интегрирования</label>
            <div class="limits-row">
                <input type="text" id="lowerLimit" placeholder="Нижний предел a" value="0">
                <input type="text" id="upperLimit" placeholder="Верхний предел b" value="pi">
            </div>
            <div class="pi-hint">Подсказка: используйте <b>pi</b> для числа π (например: 2*pi, pi/2)</div>
        </div>

        <div class="button-row">
            <button class="calc-btn" onclick="calculateIntegral()">ВЫЧИСЛИТЬ</button>
            <button class="hint-btn" onclick="showFormulaHint()">📖 Подсказка</button>
        </div>

        <div id="hintBlock" class="hint-block">
            <div class="hint-title">💡 Формула для решения</div>
            <div class="hint-formula math" id="hintFormula"></div>
            <div class="hint-desc math" id="hintDesc"></div>
        </div>

        <div id="resultBlock" class="result" style="display: none;">
            <div class="result-label">📐 РЕЗУЛЬТАТ</div>
            <div id="integralResult" class="result-value math"></div>
        </div>
        <div id="errorMessage" class="error-message"></div>
    </div>

    <div style="text-align: center;">
        <a href="index.html" class="back-link">← Назад</a>
    </div>
</div>

<script>
    let currentType = 'indefinite';

    function replacePi(expression) {
        return expression.replace(/pi/gi, '3.141592653589793');
    }

    function formatMathExpression(expr) {
        expr = expr.replace(/pi/gi, '\\pi');
        expr = expr.replace(/\(([^()]+)\)\/\(([^()]+)\)/g, '\\frac{$1}{$2}');
        expr = expr.replace(/\(([^()]+)\)\/([a-zA-Z0-9^\\]+)/g, '\\frac{$1}{$2}');
        expr = expr.replace(/([a-zA-Z0-9^\\]+)\/\(([^()]+)\)/g, '\\frac{$1}{$2}');
        expr = expr.replace(/\*/g, ' \\cdot ');
        expr = expr.replace(/\s+/g, ' ').trim();
        return expr;
    }

    function formatResult(result) {
        let str = result.toString();
        str = str.replace(/pi/gi, '\\pi');
        str = str.replace(/\*\*/g, '^');
        str = str.replace(/\*/g, ' \\cdot ');
        str = str.replace(/\(([^()]+)\)\/\(([^()]+)\)/g, '\\frac{$1}{$2}');
        str = str.replace(/\(([^()]+)\)\/([a-zA-Z0-9^\\]+)/g, '\\frac{$1}{$2}');
        str = str.replace(/([a-zA-Z0-9^\\]+)\/\(([^()]+)\)/g, '\\frac{$1}{$2}');
        str = str.replace(/([a-zA-Z0-9^\\]+)\/([a-zA-Z0-9^\\]+)/g, '\\frac{$1}{$2}');
        str = str.replace(/\s+/g, ' ').trim();
        return str;
    }

    // Функция определения типа функции и возврата формулы интеграла
    function detectIntegralFormula(func) {
        const f = func.toLowerCase().replace(/\s/g, '');

        if (f.match(/^x\^(\d+)$/)) {
            return {
                formula: '\\int x^n dx = \\frac{x^{n+1}}{n+1} + C, \\quad n \\neq -1',
                desc: 'Степенная функция. Увеличиваем степень на 1 и делим на новую степень.'
            };
        }

        if (f === '1/x' || f === 'x^{-1}') {
            return {
                formula: '\\int \\frac{1}{x} dx = \\ln|x| + C',
                desc: 'Интеграл от обратной функции — натуральный логарифм.'
            };
        }

        if (f.includes('sin')) {
            return {
                formula: '\\int \\sin(ax) dx = -\\frac{1}{a}\\cos(ax) + C',
                desc: 'Интеграл от синуса — минус косинус.'
            };
        }

        if (f.includes('cos')) {
            return {
                formula: '\\int \\cos(ax) dx = \\frac{1}{a}\\sin(ax) + C',
                desc: 'Интеграл от косинуса — синус.'
            };
        }

        if (f.includes('tan') || f.includes('tg')) {
            return {
                formula: '\\int \\tan x dx = -\\ln|\\cos x| + C',
                desc: 'Интеграл от тангенса.'
            };
        }

        if (f.includes('e^')) {
            return {
                formula: '\\int e^{ax} dx = \\frac{1}{a} e^{ax} + C',
                desc: 'Интеграл от экспоненты — сама экспонента.'
            };
        }

        if (f.includes('ln')) {
            return {
                formula: '\\int \\ln x dx = x\\ln x - x + C',
                desc: 'Интеграл от натурального логарифма (интегрирование по частям).'
            };
        }

        if (f.includes('sqrt(') || f.includes('^(1/2)')) {
            return {
                formula: '\\int \\sqrt{x} dx = \\frac{2}{3} x^{3/2} + C',
                desc: 'Квадратный корень — это степень $x^{1/2}$.'
            };
        }

        if (f.includes('+') || f.includes('-')) {
            return {
                formula: '\\int [u(x) \\pm v(x)] dx = \\int u(x) dx \\pm \\int v(x) dx',
                desc: 'Интеграл суммы/разности функций равен сумме/разности интегралов.'
            };
        }

        return {
            formula: '\\text{Используйте основные правила интегрирования}',
            desc: 'См. раздел "Первообразная и интеграл" в справочнике для полного списка формул.'
        };
    }

    async function showFormulaHint() {
        const func = document.getElementById('functionInput').value.trim();
        const type = currentType;

        if (!func) {
            document.getElementById('hintFormula').innerHTML = '⚠️ Введите функцию';
            document.getElementById('hintDesc').innerHTML = 'Напишите $f(x)$ в поле ввода, чтобы получить подсказку.';
            document.getElementById('hintBlock').classList.add('show');
            if (window.MathJax) MathJax.typesetPromise();
            return;
        }

        const info = detectIntegralFormula(func);

        let typeText = '';
        if (type === 'indefinite') {
            typeText = 'неопределённого интеграла (нахождение первообразной)';
        } else {
            typeText = 'определённого интеграла. Формула Ньютона-Лейбница: $\\int_a^b f(x) dx = F(b) - F(a)$, где $F(x)$ — первообразная.';
        }

        document.getElementById('hintFormula').innerHTML = `$$${info.formula}$$`;
        document.getElementById('hintDesc').innerHTML = `${info.desc}<br><br>🎯 Применяется для ${typeText}`;

        const hintBlock = document.getElementById('hintBlock');
        hintBlock.classList.add('show');

        if (window.MathJax) {
            await MathJax.typesetPromise();
        }

        setTimeout(() => {
            hintBlock.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }, 100);
    }

    function hideHint() {
        const hintBlock = document.getElementById('hintBlock');
        hintBlock.classList.remove('show');
    }

    window.addEventListener('load', function() {
        setTimeout(function() {
            var overlay = document.getElementById('loadingOverlay');
            overlay.style.opacity = '0';
            setTimeout(function() {
                overlay.style.display = 'none';
            }, 300);
        }, 400);
    });

    function updatePreview() {
        const func = document.getElementById('functionInput').value.trim();
        const previewDiv = document.getElementById('preview');
        if (func) {
            const formattedFunc = formatMathExpression(func);
            previewDiv.innerHTML = `\\( \\displaystyle f(x) = ${formattedFunc} \\)`;
        } else {
            previewDiv.innerHTML = `\\( f(x) = ? \\)`;
        }
        if (window.MathJax) {
            MathJax.typesetPromise([previewDiv]);
        }
    }

    document.getElementById('functionInput').addEventListener('input', function() {
        updatePreview();
        hideHint();
    });

    function setType(type) {
        currentType = type;
        const btns = document.querySelectorAll('.type-btn');
        btns.forEach(btn => {
            if ((type === 'indefinite' && btn.innerText === 'Неопределённый') ||
                (type === 'definite' && btn.innerText === 'Определённый')) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        });

        const limitsContainer = document.getElementById('limitsContainer');
        if (type === 'definite') {
            limitsContainer.style.display = 'block';
        } else {
            limitsContainer.style.display = 'none';
        }

        document.getElementById('errorMessage').innerHTML = '';
        document.getElementById('resultBlock').style.display = 'none';
        hideHint();
    }

    function calculateIntegral() {
        document.getElementById('errorMessage').innerHTML = '';
        document.getElementById('resultBlock').style.display = 'none';

        const func = document.getElementById('functionInput').value.trim();
        if (!func) {
            document.getElementById('errorMessage').innerHTML = '❌ Введите функцию f(x)';
            return;
        }

        if (typeof Algebrite === 'undefined') {
            document.getElementById('errorMessage').innerHTML = '❌ Библиотека не загружена. Проверьте подключение к интернету.';
            return;
        }

        const variable = 'x';

        try {
            if (currentType === 'indefinite') {
                const integralResult = Algebrite.integral(func, variable);
                let resultString = formatResult(integralResult.toString());

                if (resultString === '0' && !func.includes('0')) {
                    document.getElementById('integralResult').innerHTML = `Не удалось вычислить интеграл для \\( ${formatMathExpression(func)} \\) + C`;
                    document.getElementById('resultBlock').style.display = 'block';
                    if (window.MathJax) MathJax.typesetPromise();
                    return;
                }

                document.getElementById('integralResult').innerHTML = `\\( ${resultString} + C \\)`;
                document.getElementById('resultBlock').style.display = 'block';
                if (window.MathJax) MathJax.typesetPromise();

            } else {
                let lower = document.getElementById('lowerLimit').value.trim();
                let upper = document.getElementById('upperLimit').value.trim();

                if (lower === '' || upper === '') {
                    document.getElementById('errorMessage').innerHTML = '❌ Введите оба предела интегрирования';
                    return;
                }

                let lowerNum = replacePi(lower);
                let upperNum = replacePi(upper);

                const F = Algebrite.integral(func, variable);
                const F_upper = Algebrite.eval(F.toString(), variable, upperNum);
                const F_lower = Algebrite.eval(F.toString(), variable, lowerNum);

                let definiteResult = Algebrite.simplify(`(${F_upper.toString()}) - (${F_lower.toString()})`);
                let resultString = definiteResult.toString();

                let numericResult;
                try {
                    numericResult = Algebrite.float(definiteResult.toString());
                    let num = parseFloat(numericResult.toString());
                    if (!isNaN(num)) {
                        resultString = Number(num.toFixed(6)).toString();
                    }
                } catch(e) {}

                let displayResult = resultString;
                if (resultString.includes('pi')) {
                    displayResult = formatResult(resultString);
                }

                let exactResult = formatResult(definiteResult.toString());
                if (exactResult !== displayResult && !displayResult.includes('\\pi')) {
                    displayResult = `${displayResult} \\; ( = ${exactResult} )`;
                }

                document.getElementById('integralResult').innerHTML = `\\( ${displayResult} \\)`;
                document.getElementById('resultBlock').style.display = 'block';
                if (window.MathJax) MathJax.typesetPromise();
            }
        } catch (error) {
            console.error('Ошибка:', error);
            document.getElementById('errorMessage').innerHTML = `❌ Ошибка: не удалось вычислить интеграл для '${func}'. Проверьте правильность ввода.`;
        }
    }

    (function() {
        var savedTheme = localStorage.getItem('mathTheme');
        if (savedTheme === 'light') {
            document.documentElement.classList.add('light-mode');
            var btn = document.getElementById('themeBtn');
            if (btn) btn.textContent = '☀️';
        }
    })();

    function toggleTheme() {
        var html = document.documentElement;
        var btn = document.getElementById('themeBtn');
        if (html.classList.contains('light-mode')) {
            html.classList.remove('light-mode');
            localStorage.setItem('mathTheme', 'dark');
            if (btn) btn.textContent = '🌙';
        } else {
            html.classList.add('light-mode');
            localStorage.setItem('mathTheme', 'light');
            if (btn) btn.textContent = '☀️';
        }
        updatePreview();
        if (window.MathJax) MathJax.typesetPromise();
    }

    updatePreview();
    setType('indefinite');
</script>

<script>const FAV_KEY='math_favorites';function getFavorites(){const s=localStorage.getItem(FAV_KEY);return s?JSON.parse(s):[];}function saveFavorites(f){localStorage.setItem(FAV_KEY,JSON.stringify(f));}function isFavorite(){const u=window.location.pathname.split('/').pop();return getFavorites().includes(u);}function toggleFavorite(){const u=window.location.pathname.split('/').pop();let f=getFavorites();const btn=document.getElementById('favoriteBtn');if(f.includes(u)){f=f.filter(x=>x!==u);btn.textContent='☆';btn.classList.remove('active');}else{f.push(u);btn.textContent='★';btn.classList.add('active');}saveFavorites(f);}function updateFavoriteBtn(){const btn=document.getElementById('favoriteBtn');if(btn){if(isFavorite()){btn.textContent='★';btn.classList.add('active');}else{btn.textContent='☆';btn.classList.remove('active');}}}updateFavoriteBtn();</script>
</body>
