<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Ęŕëüęóë˙ňîđ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        :root {
            --bg: #1a2d3c;
            --card-bg: #1e3545;
            --text: #ffffff;
            --text-secondary: #8ba5b8;
            --accent: #1abc9c;
            --border: rgba(46, 204, 113, 0.1);
            --btn-bg: #2c5a77;
            --btn-number-bg: #3a6e8f;
            --display-bg: #0f2a38;
            --func-bg: #2c5a77;
            --history-bg: rgba(15, 42, 56, 0.5);
        }

        :root.light-mode {
            --bg: linear-gradient(145deg, #f5f7fc 0%, #eef2f8 100%);
            --card-bg: white;
            --text: #1a2a3f;
            --text-secondary: #6a7e9c;
            --accent: #1abc9c;
            --border: #eff3f8;
            --btn-bg: #e2e8f0;
            --btn-number-bg: #cbd5e1;
            --display-bg: #f1f5f9;
            --func-bg: #d1d5db;
            --history-bg: #eef2f8;
        }

        body {
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            min-height: 100vh;
            padding: 12px;
        }

        .container {
            max-width: 100%;
            margin: 0 auto;
            position: relative;
        }

        .theme-toggle {
            position: absolute;
            top: 0;
            right: 0;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--card-bg);
            border: 1px solid var(--border);
            cursor: pointer;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            color: var(--text);
        }

        .calculator {
            background: var(--card-bg);
            border-radius: 32px;
            padding: 16px;
            box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border);
            margin-top: 50px;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .angle-toggle {
            display: flex;
            gap: 12px;
        }

        .angle-btn {
            padding: 6px 16px;
            background: var(--btn-bg);
            border: none;
            border-radius: 30px;
            color: var(--text);
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
        }

        .angle-btn.active {
            background: var(--accent);
        }

        /* Čńňîđč˙ */
        .history {
            background: var(--history-bg);
            border-radius: 16px;
            padding: 8px 12px;
            margin-bottom: 12px;
            max-height: 80px;
            overflow-y: auto;
            font-size: 0.7rem;
            color: var(--text-secondary);
        }

        .history-item {
            padding: 3px 0;
            border-bottom: 1px solid var(--border);
            font-family: monospace;
            cursor: pointer;
        }

        .history-item:hover {
            color: var(--accent);
            padding-left: 6px;
        }

        .clear-history {
            float: right;
            font-size: 0.65rem;
            cursor: pointer;
            background: var(--btn-bg);
            padding: 1px 6px;
            border-radius: 12px;
            margin-bottom: 4px;
        }

        .clear-history:hover {
            background: var(--accent);
            color: white;
        }

        .display {
            background: var(--display-bg);
            border-radius: 20px;
            padding: 20px 16px;
            margin-bottom: 16px;
            text-align: right;
            word-wrap: break-word;
            word-break: break-all;
        }

        .display .expression {
            font-size: 1rem;
            color: var(--text-secondary);
            min-height: 28px;
            font-family: monospace;
        }

        .display .result {
            font-size: 2.2rem;
            font-weight: 700;
            color: var(--text);
            font-family: monospace;
            overflow-x: auto;
            white-space: nowrap;
        }

        .mode-toggle {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .mode-btn {
            flex: 1;
            padding: 12px 8px;
            background: var(--btn-bg);
            border: none;
            border-radius: 30px;
            color: var(--text);
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .mode-btn.active {
            background: var(--accent);
            color: white;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
        }

        button {
            padding: 18px 0;
            background: var(--btn-bg);
            border: none;
            border-radius: 16px;
            color: var(--text);
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.1s;
        }

        button:active {
            transform: scale(0.96);
            background: var(--accent);
        }

        .btn-number {
            background: var(--btn-number-bg);
        }

        .btn-accent {
            background: var(--accent);
            color: white;
        }

        .btn-func {
            background: var(--func-bg);
            font-size: 0.85rem;
        }

        .back-link {
            display: inline-block;
            margin-top: 16px;
            padding: 12px 24px;
            background: var(--accent);
            color: white;
            text-decoration: none;
            border-radius: 40px;
            font-weight: 600;
            font-size: 1rem;
            text-align: center;
            width: 100%;
        }

        @media (max-width: 550px) {
            body { padding: 8px; }
            .buttons { gap: 6px; }
            button { padding: 14px 0; font-size: 1rem; }
            .btn-func { font-size: 0.75rem; }
            .display .result { font-size: 1.8rem; white-space: normal; word-break: break-all; }
            .mode-btn { font-size: 0.75rem; padding: 10px 4px; }
            .history { max-height: 60px; font-size: 0.65rem; }
        }
    
    .favorite-btn { position: fixed; bottom: 20px; left: 20px; width: 44px; height: 44px; border-radius: 50%; background: var(--card-bg); border: 1px solid var(--border); cursor: pointer; font-size: 26px; display: flex; align-items: center; justify-content: center; z-index: 1000; color: var(--text-secondary); transition: all 0.2s; backdrop-filter: blur(4px); }
    .favorite-btn:hover { transform: scale(1.1); }
    .favorite-btn.active { color: #facc15; }
    </style>
</head>
<body>
<div class="container">
    <button class="favorite-btn" id="favoriteBtn" onclick="toggleFavorite()">?</button>`n    <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">??</button>

    <div class="calculator">
        <div class="top-bar">
            <div class="angle-toggle">
                <button class="angle-btn active" onclick="setAngleMode('deg')">Deg</button>
                <button class="angle-btn" onclick="setAngleMode('rad')">Rad</button>
            </div>
            <div style="width: 40px;"></div>
        </div>

        <!-- Čńňîđč˙ -->
        <div class="history" id="historyContainer">
            <div class="clear-history" onclick="clearHistory()">? Î÷čńňčňü</div>
            <div id="historyList">—</div>
        </div>

        <div class="display">
            <div class="expression" id="expression"></div>
            <div class="result" id="result">0</div>
        </div>

        <div class="mode-toggle">
            <button class="mode-btn active" onclick="setMode('basic')">Îáű÷íűé</button>
            <button class="mode-btn" onclick="setMode('engineer')">Číćĺíĺđíűé</button>
            <button class="mode-btn" onclick="setMode('programmer')">Ďđîăđŕěěčńň</button>
        </div>

        <div class="buttons" id="buttons"></div>
    </div>

    <div style="text-align: center; margin-top: 16px;">
        <a href="index.html" class="back-link">< Íŕçŕä â ěĺíţ</a>
    </div>
</div>

<script>
    let currentMode = 'basic';
    let angleUnit = 'deg';
    let expression = '';
    let result = '0';
    let history = [];

    // Čńňîđč˙
    function loadHistory() {
        const saved = localStorage.getItem('calculator_history');
        if (saved) {
            try { history = JSON.parse(saved); } catch(e) { history = []; }
        }
        updateHistoryDisplay();
    }

    function saveHistory() {
        localStorage.setItem('calculator_history', JSON.stringify(history.slice(-20)));
    }

    function addToHistory(expr, res) {
        if (expr && res && res !== '?' && res !== 'Îřčáęŕ') {
            history.unshift({ expr: expr, result: res });
            if (history.length > 20) history.pop();
            saveHistory();
            updateHistoryDisplay();
        }
    }

    function updateHistoryDisplay() {
        const historyList = document.getElementById('historyList');
        if (!historyList) return;
        if (history.length === 0) {
            historyList.innerHTML = '—';
            return;
        }
        let html = '';
        for (let i = 0; i < Math.min(history.length, 8); i++) {
            html += `<div class="history-item" onclick="restoreFromHistory(${i})">${history[i].expr} = ${history[i].result}</div>`;
        }
        historyList.innerHTML = html;
    }

    function restoreFromHistory(index) {
        if (history[index]) {
            expression = history[index].expr;
            result = history[index].result;
            updateDisplay();
        }
    }

    function clearHistory() {
        history = [];
        saveHistory();
        updateHistoryDisplay();
    }

    const basicButtons = [
        '7', '8', '9', '/', 'C',
        '4', '5', '6', '*', '?',
        '1', '2', '3', '-', '=',
        '0', '.', '+/-', '+', '%'
    ];

    const engineerButtons = [
        'sin', 'cos', 'tg', '^', 'C',
        'ln', 'log', 'v', '(', ')',
        '7', '8', '9', '*', '?',
        '4', '5', '6', '+', '-',
        '1', '2', '3', '=', '?',
        '0', '.', 'e', 'x?', 'x?',
        '1/x', '|x|', '!', 'mod', 'rad'
    ];

    const programmerButtons = [
        'HEX', 'DEC', 'BIN', 'AND', 'C',
        'A', 'B', 'C', 'OR', '?',
        'D', 'E', 'F', 'XOR', 'NOT',
        '7', '8', '9', '<<', '>>',
        '4', '5', '6', '(', ')',
        '1', '2', '3', '=', '0',
        '.', '+', '-', '*', '/'
    ];

    function isDigit(btn) {
        return (btn >= '0' && btn <= '9') || btn === '.';
    }

    // ČŃĎĐŔÂËĹÍÍŰÉ ĎĐÎÖĹÍŇ
    function percent() {
        try {
            let currentVal = evaluateExpressionRaw(expression);
            if (currentVal !== null && !isNaN(currentVal)) {
                let percentVal = currentVal / 100;
                expression = percentVal.toString();
                result = percentVal.toString();
                updateDisplay();
            }
        } catch(e) {
            result = 'Îřčáęŕ';
            updateDisplay();
        }
    }

    function evaluateExpressionRaw(expr) {
        try {
            let evalExpr = expr
                .replace(/?/g, '*')
                .replace(/?/g, '/')
                .replace(/\^/g, '**')
                .replace(/sin\(/g, 'Math.sin(')
                .replace(/cos\(/g, 'Math.cos(')
                .replace(/tg\(/g, 'Math.tan(')
                .replace(/ln\(/g, 'Math.log(')
                .replace(/log\(/g, 'Math.log10(')
                .replace(/sqrt\(/g, 'Math.sqrt(')
                .replace(/abs\(/g, 'Math.abs(')
                .replace(/PI/g, Math.PI)
                .replace(/E/g, Math.E);

            if (angleUnit === 'deg') {
                evalExpr = evalExpr.replace(/Math\.sin\(([^)]+)\)/g, 'Math.sin($1 * Math.PI / 180)');
                evalExpr = evalExpr.replace(/Math\.cos\(([^)]+)\)/g, 'Math.cos($1 * Math.PI / 180)');
                evalExpr = evalExpr.replace(/Math\.tan\(([^)]+)\)/g, 'Math.tan($1 * Math.PI / 180)');
            }

            return eval(evalExpr);
        } catch(e) {
            return null;
        }
    }

    function renderButtons() {
        const container = document.getElementById('buttons');
        let buttons = currentMode === 'basic' ? basicButtons : (currentMode === 'engineer' ? engineerButtons : programmerButtons);

        container.innerHTML = '';
        buttons.forEach(btn => {
            const button = document.createElement('button');
            button.textContent = btn;

            if (isDigit(btn)) {
                button.classList.add('btn-number');
            }

            if (btn === 'C') {
                button.onclick = () => handleClear('C');
                button.classList.add('btn-func');
            } else if (btn === '?') {
                button.onclick = () => handleClear('?');
                button.classList.add('btn-func');
            } else if (btn === '=') {
                button.onclick = calculate;
                button.classList.add('btn-accent');
            } else if (btn === '(') {
                button.onclick = () => addOperator('(');
                button.classList.add('btn-func');
            } else if (btn === ')') {
                button.onclick = () => addOperator(')');
                button.classList.add('btn-func');
            } else if (btn === 'sin' || btn === 'cos') {
                button.onclick = () => addFunction(btn);
                button.classList.add('btn-func');
            } else if (btn === 'tg') {
                button.onclick = () => addFunction('tan');
                button.classList.add('btn-func');
            } else if (btn === 'ln' || btn === 'log') {
                button.onclick = () => addFunction(btn);
                button.classList.add('btn-func');
            } else if (btn === 'v') {
                button.onclick = () => addFunction('sqrt');
                button.classList.add('btn-func');
            } else if (btn === 'x?') {
                button.onclick = () => addPower('2');
                button.classList.add('btn-func');
            } else if (btn === 'x?') {
                button.onclick = () => addPower('3');
                button.classList.add('btn-func');
            } else if (btn === '1/x') {
                button.onclick = () => addFunction('1/');
                button.classList.add('btn-func');
            } else if (btn === '|x|') {
                button.onclick = () => addFunction('abs');
                button.classList.add('btn-func');
            } else if (btn === '!') {
                button.onclick = factorial;
                button.classList.add('btn-func');
            } else if (btn === '?') {
                button.onclick = () => addConstant('PI');
                button.classList.add('btn-func');
            } else if (btn === 'e') {
                button.onclick = () => addConstant('E');
                button.classList.add('btn-func');
            } else if (btn === 'rad') {
                button.onclick = degToRad;
                button.classList.add('btn-func');
            } else if (btn === '+/-') {
                button.onclick = toggleSign;
                button.classList.add('btn-func');
            } else if (btn === 'AND' || btn === 'OR' || btn === 'XOR') {
                button.onclick = () => addOperator(btn.toLowerCase());
                button.classList.add('btn-func');
            } else if (btn === 'NOT') {
                button.onclick = bitwiseNot;
                button.classList.add('btn-func');
            } else if (btn === '<<' || btn === '>>') {
                button.onclick = () => addOperator(btn);
                button.classList.add('btn-func');
            } else if (btn === 'HEX' || btn === 'DEC' || btn === 'BIN') {
                button.onclick = () => changeBase(btn);
                button.classList.add('btn-func');
            } else if (btn === 'A' || btn === 'B' || btn === 'C' || btn === 'D' || btn === 'E' || btn === 'F') {
                button.onclick = () => addNumber(btn);
                button.classList.add('btn-func');
            } else if (btn === '%') {
                button.onclick = percent;
                button.classList.add('btn-func');
            } else if (btn === '+' || btn === '-' || btn === '*' || btn === '/' || btn === '^' || btn === 'mod') {
                button.onclick = () => addOperator(btn);
            } else {
                button.onclick = () => addNumber(btn);
            }

            container.appendChild(button);
        });
    }

    function addPower(power) {
        expression += '^' + power;
        updateDisplay();
    }

    function addConstant(constant) {
        if (constant === 'PI') expression += Math.PI;
        if (constant === 'E') expression += Math.E;
        updateDisplay();
    }

    function degToRad() {
        try {
            let val = evaluateExpressionRaw(expression);
            if (val !== null) {
                expression = (val * Math.PI / 180).toString();
                evaluateExpression();
                updateDisplay();
            }
        } catch (e) {}
    }

    function factorial() {
        try {
            let n = evaluateExpressionRaw(expression);
            if (n !== null && n >= 0 && Number.isInteger(n)) {
                let fact = 1;
                for (let i = 2; i <= n; i++) fact *= i;
                expression = fact.toString();
                result = fact.toString();
                updateDisplay();
            } else {
                result = 'Îřčáęŕ';
                updateDisplay();
            }
        } catch (e) {
            result = 'Îřčáęŕ';
            updateDisplay();
        }
    }

    function bitwiseNot() {
        try {
            let val = evaluateExpressionRaw(expression);
            if (val !== null) {
                expression = (~val).toString();
                result = expression;
                updateDisplay();
            }
        } catch (e) {}
    }

    function changeBase(base) {
        try {
            let val = parseInt(evaluateExpressionRaw(expression));
            if (base === 'HEX') expression = '0x' + val.toString(16).toUpperCase();
            if (base === 'BIN') expression = '0b' + val.toString(2);
            if (base === 'DEC') expression = val.toString();
            result = expression;
            updateDisplay();
        } catch (e) {}
    }

    function handleClear(btn) {
        if (btn === 'C') {
            expression = '';
            result = '0';
        } else if (btn === '?') {
            expression = expression.slice(0, -1);
            if (expression === '') result = '0';
            else evaluateExpression();
        }
        updateDisplay();
    }

    function addNumber(num) {
        expression += num;
        evaluateExpression();
        updateDisplay();
    }

    function addOperator(op) {
        const lastChar = expression.slice(-1);
        if (lastChar && '+-*/%^'.includes(lastChar)) {
            expression = expression.slice(0, -1) + op;
        } else {
            expression += op;
        }
        updateDisplay();
    }

    function addFunction(func) {
        expression += func + '(';
        updateDisplay();
    }

    function toggleSign() {
        if (expression) {
            if (expression[0] === '-') expression = expression.slice(1);
            else expression = '-' + expression;
            evaluateExpression();
            updateDisplay();
        }
    }

    function evaluateExpression() {
        try {
            let evalExpr = expression
                .replace(/?/g, '*')
                .replace(/?/g, '/')
                .replace(/\^/g, '**')
                .replace(/sin\(/g, 'Math.sin(')
                .replace(/cos\(/g, 'Math.cos(')
                .replace(/tg\(/g, 'Math.tan(')
                .replace(/ln\(/g, 'Math.log(')
                .replace(/log\(/g, 'Math.log10(')
                .replace(/sqrt\(/g, 'Math.sqrt(')
                .replace(/abs\(/g, 'Math.abs(')
                .replace(/PI/g, Math.PI)
                .replace(/E/g, Math.E);

            if (angleUnit === 'deg') {
                evalExpr = evalExpr.replace(/Math\.sin\(([^)]+)\)/g, 'Math.sin($1 * Math.PI / 180)');
                evalExpr = evalExpr.replace(/Math\.cos\(([^)]+)\)/g, 'Math.cos($1 * Math.PI / 180)');
                evalExpr = evalExpr.replace(/Math\.tan\(([^)]+)\)/g, 'Math.tan($1 * Math.PI / 180)');
            }

            let calcResult = eval(evalExpr);
            result = calcResult.toString();
        } catch (e) {
            if (expression && !isNaN(expression)) result = expression;
            else result = '?';
        }
    }

    function calculate() {
        if (!expression) return;
        const currentExpr = expression;
        evaluateExpression();
        if (result !== '?' && result !== 'Îřčáęŕ') {
            addToHistory(currentExpr, result);
            expression = result;
        }
        updateDisplay();
    }

    function updateDisplay() {
        document.getElementById('expression').textContent = expression || '';
        document.getElementById('result').textContent = result;
    }

    function setMode(mode) {
        currentMode = mode;
        document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');
        expression = '';
        result = '0';
        renderButtons();
        updateDisplay();
    }

    function setAngleMode(mode) {
        angleUnit = mode;
        document.querySelectorAll('.angle-btn').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');
        if (expression) {
            evaluateExpression();
            updateDisplay();
        }
    }

    (function() {
        var savedTheme = localStorage.getItem('mathTheme');
        if (savedTheme === 'light') {
            document.documentElement.classList.add('light-mode');
            var btn = document.getElementById('themeBtn');
            if (btn) btn.textContent = '??';
        }
        loadHistory();
    })();

    function toggleTheme() {
        var html = document.documentElement;
        var btn = document.getElementById('themeBtn');
        if (html.classList.contains('light-mode')) {
            html.classList.remove('light-mode');
            localStorage.setItem('mathTheme', 'dark');
            if (btn) btn.textContent = '??';
        } else {
            html.classList.add('light-mode');
            localStorage.setItem('mathTheme', 'light');
            if (btn) btn.textContent = '??';
        }
    }

    renderButtons();
    updateDisplay();

    document.addEventListener('keydown', (e) => {
        if (e.key >= '0' && e.key <= '9') addNumber(e.key);
        if (e.key === '.') addNumber('.');
        if (e.key === '+' || e.key === '-' || e.key === '*' || e.key === '/') addOperator(e.key);
        if (e.key === 'Enter') calculate();
        if (e.key === 'Escape') handleClear('C');
        if (e.key === 'Backspace') handleClear('?');
        if (e.key === '(') addOperator('(');
        if (e.key === ')') addOperator(')');
    });
</script>

<script>const FAV_KEY='math_favorites';function getFavorites(){const s=localStorage.getItem(FAV_KEY);return s?JSON.parse(s):[];}function saveFavorites(f){localStorage.setItem(FAV_KEY,JSON.stringify(f));}function isFavorite(){const u=window.location.pathname.split('/').pop();return getFavorites().includes(u);}function toggleFavorite(){const u=window.location.pathname.split('/').pop();let f=getFavorites();const btn=document.getElementById('favoriteBtn');if(f.includes(u)){f=f.filter(x=>x!==u);btn.textContent='?';btn.classList.remove('active');}else{f.push(u);btn.textContent='?';btn.classList.add('active');}saveFavorites(f);}function updateFavoriteBtn(){const btn=document.getElementById('favoriteBtn');if(btn){if(isFavorite()){btn.textContent='?';btn.classList.add('active');}else{btn.textContent='?';btn.classList.remove('active');}}}updateFavoriteBtn();</script>
</body>
</html>
